syntax = "proto2";

package groundstation;

enum FlightState {
  FLIGHT_STATE_GROUND_IDLE = 0;
  FLIGHT_STATE_ARMED = 1;
  FLIGHT_STATE_POWERED_ASCENT = 2;
  FLIGHT_STATE_COAST_ASCENT = 3;
  FLIGHT_STATE_APOGEE = 4;
  FLIGHT_STATE_DESCENT_DROGUE = 5;
  FLIGHT_STATE_DESCENT_MAIN = 6;
  FLIGHT_STATE_LANDED = 7;
  FLIGHT_STATE_FAULT = 255;
}

enum JogAxis {
  JOG_AXIS_UNSPECIFIED = 0;
  JOG_AXIS_AZ = 1;
  JOG_AXIS_EL = 2;
}

enum TrackerMode {
  TRACKER_MODE_STOP = 0;
  TRACKER_MODE_MANUAL = 1;
  TRACKER_MODE_AUTO = 2;
  TRACKER_MODE_SCAN = 3;
  TRACKER_MODE_SERVOTEST = 4;
  TRACKER_MODE_FAULT = 5;
}

enum CalibrationAction {
  CAL_ACTION_UNSPECIFIED = 0;
  CAL_ACTION_BEGIN_GUIDED = 1;
  CAL_ACTION_SET_AZ_REFERENCE = 2;
  CAL_ACTION_SET_EL_REFERENCE = 3;
  CAL_ACTION_CLEAR = 4;
  CAL_ACTION_ENABLE_TRACKING = 5;
}

message RocketLoRaSample {
  optional uint32 boot_ms = 1;
  optional FlightState state = 2;
  optional uint32 sats = 3;
  optional uint32 flags = 4;
  optional double lat = 5;
  optional double lon = 6;
  optional float alt_gps_m = 7;
  optional float alt_baro_m = 8;
  optional float speed_ms = 9;
  repeated float q = 10;
  optional float rssi = 11;
  optional float snr = 12;
}

message Lora1Rf69Packet {
  optional bytes data = 1;
  optional float rssi = 2;
  optional float snr = 3;
}

message AntennaState {
  optional uint64 timestamp = 1;
  optional float actual_az = 2;
  optional float actual_el = 3;
  optional float target_az = 4;
  optional float target_el = 5;
  optional float actual_az_mech = 6;
  optional float target_az_mech = 7;
  optional bool az_calibrated = 8;
  optional bool zen_calibrated = 9;
  optional bool tracking_enabled = 10;
  optional bool az_moving = 11;
  optional bool zen_moving = 12;
  optional bool az_faulted = 13;
  optional bool zen_faulted = 14;
  optional string mode = 15;
  optional bool armed = 16;
  optional bool gs_fresh = 17;
  optional bool target_fresh = 18;
  optional bool ahrs_el_used = 19;
  optional bool ahrs_az_used = 20;
  optional float distance_m = 21;
  optional float pointing_error_az = 22;
  optional float pointing_error_el = 23;
  optional float az_reference_deg = 24;
  optional float el_reference_deg = 25;
  optional uint32 calibration_seq = 26;
  optional string calibration_status = 27;
}

message GroundImu {
  optional uint64 timestamp = 1;
  optional float roll = 2;
  optional float pitch = 3;
  optional float yaw = 4;
  optional float yaw360 = 5;
  repeated float q = 6;
  repeated float a = 7;
  repeated float m = 8;
  optional bool have_mag = 9;
  optional bool startup = 10;
  optional bool mag_rec = 11;
  optional bool acc_rec = 12;
  optional float alt_baro = 13;
  optional float temp = 14;
  optional bool valid = 15;
  optional bool have_yaw_frame = 16;
  optional float yaw_frame_yaw = 17;
  optional float yaw_frame_yaw360 = 18;
  optional bool yaw_startup = 19;
  optional float bar_rel_roll = 20;
  optional float bar_rel_pitch = 21;
  optional float bar_rel_yaw = 22;
  repeated float bar_q = 23;      // Raw bar/zenith AHRS quaternion q_EB [w,x,y,z]
  repeated float yaw_q = 24;      // Raw yaw-platform AHRS quaternion q_EY [w,x,y,z]
  repeated float bar_rel_q = 25;  // Relative quaternion q_YB = inverse(q_EY) * q_EB [w,x,y,z]
}

message AhrsStatus {
  optional uint64 timestamp = 1;
  optional bool running = 2;
  optional bool have_bar_imu = 3;
  optional bool have_bar_mag = 4;
  optional bool have_yaw_imu = 5;
  optional bool have_yaw_mag = 6;
  optional uint32 bar_updates = 7;
  optional uint32 yaw_updates = 8;
}

message RawImuSample {
  optional uint64 timestamp = 1;
  optional float ax = 2;
  optional float ay = 3;
  optional float az = 4;
  optional float gx = 5;
  optional float gy = 6;
  optional float gz = 7;
  optional float temp = 8;
}

message RawMagSample {
  optional uint64 timestamp = 1;
  optional float mx = 2;
  optional float my = 3;
  optional float mz = 4;
}

message RawYawImuSample {
  optional uint64 timestamp = 1;
  optional float ax = 2;
  optional float ay = 3;
  optional float az = 4;
  optional float gx = 5;
  optional float gy = 6;
  optional float gz = 7;
  optional float mx_ut = 8;
  optional float my_ut = 9;
  optional float mz_ut = 10;
  optional bool mag_valid = 11;
  optional bool mag_overflow = 12;
  optional float temp = 13;
}

message RawSensorsCommand {
  optional bool imu = 1;
  optional bool mag = 2;
  optional bool yaw_imu = 3;
}

message AxisCommand {
  optional float target_angle_deg = 1;
  optional float speed_dps = 2;
  optional bool stop = 3;
}

message JogCommand {
  optional JogAxis axis = 1;
  optional float delta_deg = 2;
  optional float speed_dps = 3;
}

message DeclinationCommand {
  optional float declination_deg = 1;
}

message TrackerModeCommand {
  optional TrackerMode mode = 1;
}

message TrackerArmCommand {
  optional bool armed = 1;
}

message TrackerConfigCommand {
  optional float yaw_trim_deg = 1;
  optional float el_trim_deg = 2;
  optional float az_min_deg = 3;
  optional float az_max_deg = 4;
  optional float el_min_deg = 5;
  optional float el_max_deg = 6;
  optional float default_speed_dps = 7;
  optional float max_speed_dps = 8;
  optional float scan_speed_az_dps = 9;
  optional float scan_speed_el_dps = 10;
  optional uint32 gs_timeout_ms = 11;
  optional uint32 target_timeout_ms = 12;
  optional float distance_min_m = 13;
  optional bool scan_on_loss = 14;
  optional bool use_ahrs_el = 15;
  optional bool use_ahrs_az = 16;
  optional float ahrs_max_age_ms = 17;
  optional float ahrs_feedback_gain = 18;
  optional float ahrs_max_correction_deg = 19;
}

message CalibrationCommand {
  optional CalibrationAction action = 1;
  optional float reference_deg = 2;
  optional string note = 3;
  optional uint32 step = 4;
}

message LocationCommand {
  optional double lat = 1;
  optional double lon = 2;
  optional double alt_m = 3;
}

message StarlinkProxyStatus {
  optional double lat = 1;
  optional double lon = 2;
  optional double alt = 3;
  optional float horizontal_speed_mps = 4;
  optional float vertical_speed_mps = 5;
  optional float pop_ping_latency_ms = 6;
  optional float pop_ping_drop_rate = 7;
  optional float downlink_throughput_bps = 8;
  optional float uplink_throughput_bps = 9;
  optional float boresight_azimuth_deg = 10;
  optional float boresight_elevation_deg = 11;
  optional bool gps_valid = 12;
  optional uint32 gps_sats = 13;
  optional string hardware_version = 14;
  optional string software_version = 15;
  optional uint32 uptime_s = 16;
  optional string error = 17;
  optional string location_error = 18;
  optional double last_ok = 19;
}
